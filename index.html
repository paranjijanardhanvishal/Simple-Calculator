<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A simple and clean calculator to calculate simple interest and total amount.">
</head>
<body>
    <div class="calculator-container">
        <h1>Simple Interest Calculator</h1>
        <p class="subtitle">Calculate your interest easily and quickly</p>
        
        <div class="input-group">
            <label for="principal">Principal Amount ($)</label>
            <input type="number" id="principal" placeholder="Enter principal amount" min="0">
        </div>
        
        <div class="input-group">
            <label for="rate">Rate of Interest (%)</label>
            <input type="number" id="rate" placeholder="Enter annual interest rate" min="0" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="time">Time Period (Years)</label>
            <input type="number" id="time" placeholder="Enter time period in years" min="0" step="1">
        </div>
        
        <button id="calculate-btn">Calculate</button>
        
        <div class="result-section" id="result-section">
            <div class="result-box">
                <h3>Interest Amount</h3>
                <p id="interest-result">$0.00</p>
            </div>
            <div class="result-box">
                <h3>Total Amount</h3>
                <p id="total-result">$0.00</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
